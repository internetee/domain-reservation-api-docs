openapi: 3.0.0
info:
  title: Business Registry Domain Reservation API
  version: 1.1.0
  description: |
    # Domain Reservation API for the Estonian Business Registry

    This API allows the Business Registry (Ariregister) to reserve `.ee` domain names
    on behalf of entrepreneurs during the company registration process.

    ## Glossary

    | Term | Description |
    |------|-------------|
    | **Registration code (password)** | A unique secret code returned when a domain is reserved. The entrepreneur must provide this code to an accredited `.ee` registrar to complete the domain registration via the EPP protocol. Without this code, the domain cannot be registered. |
    | **user_unique_id** | A 10-character identifier generated for each reservation request. It links a user session to their reserved domains. Must be stored by the Business Registry portal to retrieve reservation details later. |
    | **invoice_number** | An invoice identifier generated by the billing system for paid (long-term) reservations. Must be stored together with `user_unique_id` to check payment status. |
    | **linkpay_url** | A one-time Everypay payment page URL. The Business Registry portal should redirect the user to this URL to complete the payment. No automatic callback redirect — use the status endpoint to poll for payment completion. |

    ## End-to-End Flow

    ### Step 1: Generate domain name suggestions
    The Business Registry portal sends the organization name to the API.
    The API generates domain variants (with and without hyphens, across all `.ee` zones),
    removes common legal forms (AS, OU, FIE, MTU, etc.), checks availability in the domain registry,
    and returns only the domains that are both **unregistered** and **not already reserved**.

    **Endpoint:** `GET /api/v1/business_registry/domain_names/{organization_name}`

    ### Step 2: Reserve selected domains
    The user picks one or more domain names from the suggestions. The Business Registry portal
    sends them to one of the reservation endpoints:

    #### Option A: Short-term (free) reservation — 7 days
    - **Endpoint:** `POST /api/v1/business_registry/reserve_domains`
    - Domains are reserved immediately, no payment required
    - Response includes the **registration code** (`password`) for each domain
    - The user has 7 days to register the domain at an accredited registrar using the code
    - **Important:** Store the returned `user_unique_id` to retrieve reservation details later

    #### Option B: Long-term (paid) reservation — 1 year
    - **Endpoint:** `POST /api/v1/business_registry/long_reserve_domains`
    - Creates an invoice (10 EUR per domain) and returns a payment link (`linkpay_url`)
    - Domains are NOT yet reserved — they enter `pending` status until payment is completed
    - **Important:** Store both `invoice_number` and `user_unique_id` to check payment status later
    - After the user pays, the domains are reserved for 1 year and registration codes become available

    ### Step 3: Check reservation status and retrieve registration codes

    #### For short-term reservations:
    - **Endpoint:** `GET /api/v1/business_registry/reserve_domains/{user_unique_id}`
    - Returns the list of domains with their current status and registration codes

    #### For long-term reservations:
    - **Endpoint:** `GET /api/v1/business_registry/long_reserve_domains_status?invoice_number=...&user_unique_id=...`
    - Poll this endpoint after redirecting the user to the payment page
    - When status becomes `paid`, the response includes registration codes for each domain
    - **Note:** Calling this endpoint when the invoice is paid also triggers the creation of reserved domain records (idempotent)

    ### Step 4: Register the domain
    The entrepreneur takes the registration code (`password`) to any accredited `.ee` registrar
    and registers the domain via the EPP protocol. Once registered, the domain is removed
    from the reserved list.

    ## Domain Status Tracking

    Both status endpoints (`/reserve_domains/{user_unique_id}` and `/long_reserve_domains_status`)
    return a `status` field for each domain, allowing the Business Registry portal to show
    only the domains that still need action:

    | Status | Meaning | Fields present |
    |--------|---------|----------------|
    | `reserved` | Domain is reserved and waiting for registration | `name`, `status`, `password`, `expire_at` |
    | `registered` | Domain has been registered through a registrar | `name`, `status` |
    | `expired` | Reservation has expired (domain is no longer held) | `name`, `status` |

    **Typical usage:** Filter the response to show only domains with `status: "reserved"` —
    these are the domains the user still needs to register.

    ## Long-term Reservation: Invoice and Payment Logic

    - Each reservation request generates a unique invoice in the Everypay billing system
    - If a new reservation request includes domains that overlap with an existing unpaid invoice:
      * The system checks if the existing invoice has been paid in the meantime
      * If not paid, a new invoice is created with the same invoice number but a different `user_unique_id`
      * If the existing invoice was already paid, the request is rejected with an error
    - When any user completes payment for a shared invoice number, all other unpaid invoices
      with the same number are automatically cancelled (Everypay Linkpay behavior)
    - Users whose invoices were cancelled must submit a new reservation request
    - **Price:** Currently fixed at 10 EUR per domain

    ## Authentication

    All endpoints require two forms of authentication:

    1. **IP restriction:** The request must originate from an IP address listed in the server configuration
    2. **Bearer token:** The `Authorization` header must contain a valid API token

    ```
    Authorization: Bearer <your-api-token>
    ```

    ## Limits and Validation

    - **Maximum 20 domains** per reservation request
    - Domain names must match the pattern `[\p{L}\p{N}\-\.]+` (letters, numbers, hyphens, dots)
    - Domain names are normalized to lowercase Unicode before processing
    - Organization names for domain suggestions: max 100 characters, pattern `[\p{L}\p{N}\s\-]+`

servers:
  - url: https://testadm.internet.ee
    description: Staging API server

paths:
  /api/v1/business_registry/domain_names/{organization_name}:
    get:
      tags:
        - Domain Suggestions
      summary: Get available domain name suggestions for an organization
      description: |
        Generates domain name variants based on the organization name and returns only those
        that are currently available for registration.

        **How it works:**
        1. Strips common Estonian legal forms from the name (AS, OU, FIE, MTU, etc.)
        2. Generates variants: concatenated (`examplecompany`) and hyphenated (`example-company`)
        3. Combines variants with all available `.ee` zone origins
        4. Checks each variant against the domain registry (EPP) for availability
        5. Filters out domains that are already reserved by other users
        6. Returns only the available domain names

        **Note:** Expired reservations are automatically cleaned up during the availability check,
        so a previously reserved domain may become available again after its reservation period ends.
      parameters:
        - name: organization_name
          in: path
          required: true
          schema:
            type: string
            maxLength: 100
            pattern: '^[\p{L}\p{N}\s\-]+$'
          description: |
            Name of the organization to generate domain variants for.
            Common legal forms (AS, OU, FIE, MTU, etc.) are automatically removed before generating variants.
          example: "Example Company OU"
      responses:
        '200':
          description: List of available domain name variants
          content:
            application/json:
              schema:
                type: object
                properties:
                  variants:
                    type: array
                    items:
                      type: string
                    description: |
                      Domain names that are currently available for registration.
                      May be empty if all generated variants are already taken or reserved.
                    example: ["examplecompany.ee", "example-company.ee"]
              examples:
                multiple_variants:
                  summary: Multiple available variants
                  value:
                    variants: ["examplecompany.ee", "example-company.ee"]
                no_variants:
                  summary: No available domains
                  value:
                    variants: []
        '400':
          description: Invalid organization name (empty, too long, or contains invalid characters)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Invalid organization name"
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        - ipRestriction: []
          BearerAuth: []


  /api/v1/business_registry/reserve_domains:
    post:
      tags:
        - Short-term Reservation (Free)
      summary: Reserve domains for 7 days without payment
      description: |
        Creates free short-term domain reservations (7 days). Reserved domains receive a unique
        **registration code** (`password`) that the entrepreneur must use to register the domain
        at an accredited `.ee` registrar.

        **Important behaviors:**
        - Only domains that are currently available (not registered and not reserved) will be reserved
        - If some requested domains are unavailable, they are silently skipped — only available ones are reserved
        - If none of the requested domains are available, a `422` error is returned
        - Each reserved domain gets its own unique registration code
        - The reservation expires after 7 days — after that, the domain becomes available again

        **What to store:** Save the `user_unique_id` from the response. You will need it to retrieve
        the registration codes later via `GET /reserve_domains/{user_unique_id}`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - domain_names
              properties:
                domain_names:
                  type: array
                  items:
                    type: string
                    pattern: '^[\p{L}\p{N}\-\.]+$'
                  minItems: 1
                  maxItems: 20
                  description: Array of domain names to reserve. Must include the zone (e.g., `.ee`).
                  example: ["examplecompany.ee", "example-company.ee"]
            example:
              domain_names: ["examplecompany.ee", "example-company.ee"]
      responses:
        '201':
          description: Domains successfully reserved
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Domains reserved successfully"
                  reserved_domains:
                    type: array
                    description: |
                      List of domains that were successfully reserved.
                      May contain fewer items than requested if some domains were unavailable.
                    items:
                      type: object
                      required:
                        - name
                        - password
                        - expire_at
                      properties:
                        name:
                          type: string
                          description: The reserved domain name
                          example: "examplecompany.ee"
                        password:
                          type: string
                          description: |
                            **Registration code.** The entrepreneur must provide this code
                            to an accredited `.ee` registrar to register the domain via the EPP protocol.
                          example: "0b23bf0decfb2724ebd37e46715b63d8"
                        expire_at:
                          type: string
                          format: date-time
                          description: |
                            Reservation expiration date (7 days from creation).
                            After this date, the domain becomes available for others.
                          example: "2025-03-13T14:30:00.000+02:00"
                  user_unique_id:
                    type: string
                    description: |
                      Unique identifier for this reservation session (10 characters).
                      **Must be stored** to retrieve reservation details later via
                      `GET /reserve_domains/{user_unique_id}`.
                    example: "f8d51313-b"
              example:
                message: "Domains reserved successfully"
                reserved_domains:
                  - name: "examplecompany.ee"
                    password: "0b23bf0decfb2724ebd37e46715b63d8"
                    expire_at: "2025-03-13T14:30:00.000+02:00"
                  - name: "example-company.ee"
                    password: "a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6"
                    expire_at: "2025-03-13T14:30:00.000+02:00"
                user_unique_id: "f8d51313-b"
        '400':
          description: |
            Invalid parameters. Returned when:
            - `domain_names` is missing, empty, or not an array
            - Any domain name contains invalid characters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Invalid parameter: domain_names must be a non-empty array of valid domain names"
        '422':
          description: |
            Validation failed. Possible errors:
            - `"The maximum number of domain names per request is 20"` — too many domains
            - `"No available domains"` — none of the requested domains are available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                max_exceeded:
                  summary: Too many domains
                  value:
                    error: "The maximum number of domain names per request is 20"
                none_available:
                  summary: No domains available
                  value:
                    error: "No available domains"
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        - ipRestriction: []
          BearerAuth: []


  /api/v1/business_registry/reserve_domains/{user_unique_id}:
    get:
      tags:
        - Short-term Reservation (Free)
      summary: Get status and registration codes for short-term reserved domains
      description: |
        Retrieves the current state of domains from a short-term (free) reservation.

        Each domain in the response includes a `status` field that reflects its current state:
        - **`reserved`** — Domain is still reserved. The response includes the `password` (registration code)
          and `expire_at` date. The entrepreneur can use the registration code to register the domain at a registrar.
        - **`registered`** — Domain has already been registered through a registrar using the registration code.
          No `password` or `expire_at` is returned.
        - **`expired`** — The 7-day reservation period has ended. The domain is no longer held and may be
          taken by someone else. No `password` or `expire_at` is returned.

        **Typical usage:** Display only domains with `status: "reserved"` to the user —
        these are the ones that still need to be registered at a registrar.

        **Note:** For long-term (paid) reservations, use
        `GET /api/v1/business_registry/long_reserve_domains_status` instead.
      parameters:
        - name: user_unique_id
          in: path
          required: true
          schema:
            type: string
          description: |
            The unique identifier returned in the `user_unique_id` field
            when the domains were reserved via `POST /reserve_domains`.
          example: "f8d51313-b"
      responses:
        '200':
          description: List of domains with their current statuses
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - name
                    - status
                  properties:
                    name:
                      type: string
                      description: The domain name
                      example: "examplecompany.ee"
                    status:
                      type: string
                      enum: [reserved, registered, expired]
                      description: |
                        Current status of the domain:
                        - `reserved` — still reserved, registration code available
                        - `registered` — already registered at a registrar
                        - `expired` — reservation period ended
                      example: "reserved"
                    password:
                      type: string
                      description: |
                        **Registration code.** Only present when `status` is `reserved`.
                        The entrepreneur provides this code to a registrar to complete domain registration.
                      example: "0b23bf0decfb2724ebd37e46715b63d8"
                    expire_at:
                      type: string
                      format: date-time
                      description: |
                        Reservation expiration date. Only present when `status` is `reserved`.
                      example: "2025-03-13T14:30:00.000+02:00"
              examples:
                all_reserved:
                  summary: All domains still reserved
                  value:
                    - name: "examplecompany.ee"
                      status: "reserved"
                      password: "0b23bf0decfb2724ebd37e46715b63d8"
                      expire_at: "2025-03-13T14:30:00.000+02:00"
                    - name: "example-company.ee"
                      status: "reserved"
                      password: "a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6"
                      expire_at: "2025-03-13T14:30:00.000+02:00"
                mixed_statuses:
                  summary: Mixed statuses (one registered, one reserved, one expired)
                  value:
                    - name: "examplecompany.ee"
                      status: "registered"
                    - name: "example-company.ee"
                      status: "reserved"
                      password: "a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6"
                      expire_at: "2025-03-13T14:30:00.000+02:00"
                    - name: "example.ee"
                      status: "expired"
        '404':
          description: No reservation found for this `user_unique_id`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Reserved domains not found. Invalid user_unique_id"
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        - ipRestriction: []
          BearerAuth: []


  /api/v1/business_registry/long_reserve_domains:
    post:
      tags:
        - Long-term Reservation (Paid)
      summary: Reserve domains for 1 year with payment
      description: |
        Creates a paid long-term domain reservation (1 year). This endpoint does **not** reserve
        the domains immediately — it creates an invoice and returns a payment link.

        **Flow:**
        1. Call this endpoint with the desired domain names
        2. Receive `linkpay_url`, `invoice_number`, and `user_unique_id`
        3. Redirect the user to `linkpay_url` to complete payment in Everypay
        4. Poll `GET /long_reserve_domains_status?invoice_number=...&user_unique_id=...` to check payment status
        5. Once paid, the domains are reserved and registration codes become available

        **Important behaviors:**
        - Only available domains are included in the invoice (unavailable ones are filtered out)
        - The `available_domains` field in the response shows which domains were actually included
        - Price: currently **10 EUR per domain**
        - If some requested domains overlap with existing unpaid invoices, the system reuses the same invoice number
        - If overlapping domains already have a paid invoice, the request is rejected

        **What to store:** Save both `invoice_number` and `user_unique_id` — they are required
        to check payment status and retrieve registration codes later.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - domain_names
              properties:
                domain_names:
                  type: array
                  items:
                    type: string
                    pattern: '^[\p{L}\p{N}\-\.]+$'
                  minItems: 1
                  maxItems: 20
                  description: Array of domain names to reserve. Must include the zone (e.g., `.ee`).
                  example: ["examplecompany.ee", "example-company.ee"]
            example:
              domain_names: ["examplecompany.ee", "example-company.ee"]
      responses:
        '201':
          description: Invoice created, awaiting payment
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Domains are in pending status. Need to pay for domains."
                  linkpay_url:
                    type: string
                    description: |
                      Everypay payment page URL. Redirect the user to this URL to complete payment.
                      The URL is decoded and ready to use (no additional URL decoding needed).
                      **No automatic redirect** back to the portal — use the status endpoint to poll for completion.
                    example: "https://igw-demo.every-pay.com/lp/abc123/def456"
                  invoice_number:
                    type: integer
                    description: |
                      Invoice identifier in the billing system.
                      **Must be stored** together with `user_unique_id` to check payment status via
                      `GET /long_reserve_domains_status`.
                    example: 1234567
                  user_unique_id:
                    type: string
                    description: |
                      Unique identifier for this reservation session (10 characters).
                      **Must be stored** together with `invoice_number` to check payment status.
                    example: "a1b2c3d4e5"
                  available_domains:
                    type: array
                    items:
                      type: string
                    description: |
                      Domains that were actually included in the invoice.
                      May contain fewer items than requested if some domains were already taken or reserved.
                    example: ["examplecompany.ee", "example-company.ee"]
              example:
                message: "Domains are in pending status. Need to pay for domains."
                linkpay_url: "https://igw-demo.every-pay.com/lp/abc123/def456"
                invoice_number: 1234567
                user_unique_id: "a1b2c3d4e5"
                available_domains: ["examplecompany.ee", "example-company.ee"]
        '400':
          description: |
            Invalid parameters. Returned when:
            - `domain_names` is missing, empty, or not an array
            - Any domain name contains invalid characters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Invalid parameter: domain_names must be a non-empty array of valid domain names"
        '422':
          description: |
            Reservation cannot be processed. Possible errors:
            - `"Some domains are not available"` — some requested domains are already registered or reserved
            - `"No available domains"` — none of the requested domains are available
            - `"Some intersecting invoices are paid"` — the requested domains overlap with an already-paid invoice
            - `"The maximum number of domain names per request is 20"` — too many domains in a single request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                not_available:
                  summary: Some domains unavailable
                  value:
                    error: "Some domains are not available"
                none_available:
                  summary: No domains available
                  value:
                    error: "No available domains"
                already_paid:
                  summary: Overlapping paid invoice exists
                  value:
                    error: "Some intersecting invoices are paid"
                max_exceeded:
                  summary: Too many domains
                  value:
                    error: "The maximum number of domain names per request is 20"
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        - ipRestriction: []
          BearerAuth: []


  /api/v1/business_registry/long_reserve_domains_status:
    get:
      tags:
        - Long-term Reservation (Paid)
      summary: Check payment status and get registration codes for long-term reservations
      description: |
        Checks the payment status of a long-term domain reservation invoice and returns
        registration codes once paid.

        **How to use:**
        1. After redirecting the user to the Everypay payment page, poll this endpoint periodically
        2. When the response `status` changes to `paid`, the registration codes are available
        3. Display the `reserved_domains` array to the user, filtering by `status: "reserved"`

        **Response variants:**
        - **`paid`** — Invoice is paid. The response includes `reserved_domains` with registration codes
          and domain statuses (`reserved`, `registered`, or `expired`).
        - **Any other status** (`pending`, `unpaid`, `failed`, `error`, `cancelled`) — Invoice is not yet paid.
          The response includes the `names` array (plain list of domain names without registration codes).

        **Side effect:** When the invoice status is `paid`, calling this endpoint also triggers
        the creation of reserved domain records if they haven't been created yet (idempotent operation).

        **Note:** For short-term (free) reservations, use
        `GET /api/v1/business_registry/reserve_domains/{user_unique_id}` instead.
      parameters:
        - name: invoice_number
          in: query
          required: true
          schema:
            type: string
          description: |
            Invoice number returned by `POST /long_reserve_domains`.
          example: "1234567"
        - name: user_unique_id
          in: query
          required: true
          schema:
            type: string
          description: |
            Unique identifier returned by `POST /long_reserve_domains`.
            Both `invoice_number` and `user_unique_id` must match to retrieve the invoice.
          example: "a1b2c3d4e5"
      responses:
        '200':
          description: Invoice status retrieved successfully
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PaidReservationResponse'
                  - $ref: '#/components/schemas/UnpaidReservationResponse'
              examples:
                paid_all_reserved:
                  summary: Paid - all domains still reserved
                  value:
                    status: "paid"
                    message: "Payment received"
                    reserved_domains:
                      - name: "examplecompany.ee"
                        status: "reserved"
                        password: "0b23bf0decfb2724ebd37e46715b63d8"
                        expire_at: "2026-03-06T14:30:00.000+02:00"
                      - name: "example-company.ee"
                        status: "reserved"
                        password: "a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6"
                        expire_at: "2026-03-06T14:30:00.000+02:00"
                paid_mixed_statuses:
                  summary: Paid - one domain already registered, one still reserved
                  value:
                    status: "paid"
                    message: "Payment received"
                    reserved_domains:
                      - name: "examplecompany.ee"
                        status: "registered"
                      - name: "example-company.ee"
                        status: "reserved"
                        password: "a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6"
                        expire_at: "2026-03-06T14:30:00.000+02:00"
                pending:
                  summary: Payment pending
                  value:
                    status: "pending"
                    message: "Payment pending"
                    names: ["examplecompany.ee", "example-company.ee"]
                cancelled:
                  summary: Invoice cancelled (another user paid first)
                  value:
                    status: "cancelled"
                    message: "Invoice cancelled"
                    names: ["examplecompany.ee", "example-company.ee"]
        '404':
          description: |
            No invoice found matching the provided `invoice_number` and `user_unique_id` combination.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Reserved domain invoice not found"
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        - ipRestriction: []
          BearerAuth: []


components:
  securitySchemes:
    ipRestriction:
      type: apiKey
      name: X-Real-IP
      in: header
      description: |
        IP-based access restriction. The request must originate from an IP address
        configured in the `business_registry_allowed_ips` server environment variable.
        This is typically the IP address of the Business Registry portal server.

    BearerAuth:
      type: http
      scheme: bearer
      description: |
        Bearer token authentication.
        Include the API token in the `Authorization` header:
        ```
        Authorization: Bearer <your-api-token>
        ```
        Valid tokens are configured via the `business_registry_api_tokens` server environment variable.

  schemas:
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Human-readable error message

    ReservedDomainEntry:
      type: object
      required:
        - name
        - status
      description: |
        A domain entry with its current status. Fields `password` and `expire_at`
        are only present when `status` is `reserved`.
      properties:
        name:
          type: string
          description: The domain name
          example: "examplecompany.ee"
        status:
          type: string
          enum: [reserved, registered, expired]
          description: |
            Current status of the domain:
            - `reserved` — Domain is reserved, registration code is available
            - `registered` — Domain has been registered at a registrar using the registration code
            - `expired` — Reservation period has ended, domain is no longer held
          example: "reserved"
        password:
          type: string
          description: |
            **Registration code.** Only present when `status` is `reserved`.
            The entrepreneur provides this code to an accredited `.ee` registrar
            to complete domain registration via the EPP protocol.
          example: "0b23bf0decfb2724ebd37e46715b63d8"
        expire_at:
          type: string
          format: date-time
          description: |
            Reservation expiration date. Only present when `status` is `reserved`.
            - Short-term reservations: 7 days from creation
            - Long-term reservations: 1 year from payment
          example: "2026-03-06T14:30:00.000+02:00"

    PaidReservationResponse:
      type: object
      title: Paid reservation
      description: Returned when the invoice has been paid successfully.
      required:
        - status
        - reserved_domains
      properties:
        status:
          type: string
          enum: [paid]
          description: Always `paid` for this response variant
        message:
          type: string
          description: Human-readable message from the billing system
          example: "Payment received"
        reserved_domains:
          type: array
          description: |
            List of all domains from the invoice with their current statuses.
            Use the `status` field to determine which domains still need registration.
          items:
            $ref: '#/components/schemas/ReservedDomainEntry'

    UnpaidReservationResponse:
      type: object
      title: Unpaid / pending reservation
      description: |
        Returned when the invoice has not been paid yet, or payment failed/was cancelled.
      required:
        - status
        - names
      properties:
        status:
          type: string
          enum: [pending, unpaid, failed, error, cancelled]
          description: |
            Invoice payment status from the billing system:
            - `pending` / `unpaid` — Waiting for payment
            - `failed` / `error` — Payment failed
            - `cancelled` — Invoice was cancelled (e.g., another user paid for overlapping domains first)
        message:
          type: string
          description: Human-readable message from the billing system
          example: "Payment pending"
        names:
          type: array
          items:
            type: string
          description: |
            Plain list of domain names from the invoice.
            Registration codes are not available until payment is completed.
          example: ["examplecompany.ee", "example-company.ee"]

  responses:
    Unauthorized:
      description: |
        Authentication failed. Either the Bearer token is missing/invalid,
        or the request IP is not in the allowed list.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Unauthorized"
